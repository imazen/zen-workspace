name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{{{ matrix.name }}}})
    runs-on: ${{{{ matrix.os }}}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {{ name: linux-x64, os: ubuntu-latest }}
          - {{ name: linux-arm64, os: ubuntu-24.04-arm }}
          - {{ name: macos-arm64, os: macos-latest }}
          - {{ name: macos-x64, os: macos-15-intel }}
          - {{ name: windows-x64, os: windows-latest }}
          - {{ name: windows-arm64, os: windows-11-arm }}
          - {{ name: linux-i686, os: ubuntu-latest, target: i686-unknown-linux-gnu, cross: true }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: cargo test
        if: '!matrix.cross'
        run: cargo test
      - name: cross test
        if: matrix.cross
        run: cross test --target ${{{{ matrix.target }}}}

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt -- --check
